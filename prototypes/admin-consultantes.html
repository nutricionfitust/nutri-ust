<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NutriUst — Panel de Consultantes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap');
  :root{
    --blue:#0072FB; --blue-2:#6EA4FB; --blue-3:#99C5FF;
    --ink-1:#0B1B33; --ink-2:#3E4E75; --ink-3:#8592B4;
    --card:#FFFFFF; --line:#DCE6F8; --chip:#EAF2FF;
    --green:#1F9D6B; --red:#E5484D;
    --shadow:rgba(20,60,140,0.10);
  }
  html{touch-action:manipulation;}
  *{scrollbar-width:none; -ms-overflow-style:none;}
  *::-webkit-scrollbar{width:0; height:0; display:none;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Plus Jakarta Sans',sans-serif;background:#FBFDFF;color:var(--ink-1);min-height:100vh;position:relative;overflow-x:hidden;}
  #bg{position:fixed; inset:0; z-index:-1; background:#FBFDFF;}
  #bg::before, #bg::after{content:''; position:absolute; border-radius:50%; filter:blur(70px);}
  #bg::before{
    width:70vw;height:70vw;max-width:900px;max-height:900px; top:-25vw; left:-20vw;
    background:radial-gradient(circle, rgba(0,114,251,0.40) 0%, rgba(0,114,251,0.16) 45%, transparent 72%);
  }
  #bg::after{
    width:65vw;height:65vw;max-width:820px;max-height:820px; bottom:-28vw; right:-18vw;
    background:radial-gradient(circle, rgba(153,197,255,0.55) 0%, rgba(110,164,251,0.22) 48%, transparent 72%);
  }
  #bg .mid{
    position:absolute; top:30%; left:50%; transform:translate(-50%,-50%);
    width:60vw;height:60vw;max-width:760px;max-height:760px; border-radius:50%; filter:blur(85px);
    background:radial-gradient(circle, rgba(110,164,251,0.30) 0%, transparent 70%);
  }
  #screen-panel{opacity:0; transform:translateY(14px); transition:opacity .32s ease, transform .38s cubic-bezier(.22,1,.36,1);}
  #screen-panel.show{opacity:1; transform:translateY(0);}
  .wrap{max-width:640px;margin:0 auto;padding:28px 18px 60px;}
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
  .brand{font-size:19px;font-weight:800;letter-spacing:-0.01em;}
  .brand span{color:var(--blue);}
  .sub{color:var(--ink-3);font-size:12.5px;margin-top:2px;font-family:'DM Mono',monospace;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:0 10px 28px var(--shadow);margin-bottom:20px;}
  .card h2{font-size:14px;margin:0 0 16px;color:var(--ink-1);display:flex;align-items:center;gap:8px;}
  label{display:block;font-size:12px;font-weight:600;color:var(--ink-2);margin-bottom:6px;margin-top:14px;}
  label:first-of-type{margin-top:0;}
  input, select{width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:10px;font-size:14.5px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink-1);outline:none;transition:border-color .15s;background:#fff;}
  input:focus, select:focus{border-color:var(--blue);}
  .row{display:flex;gap:8px;align-items:flex-end;}
  .row input{flex:1;}
  .btn-mini{flex-shrink:0;background:var(--chip);border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:12px;font-weight:600;color:var(--blue);cursor:pointer;white-space:nowrap;}
  .btn{width:100%;margin-top:18px;background:var(--blue);color:#fff;border:none;border-radius:12px;padding:13px;font-size:14.5px;font-weight:700;cursor:pointer;box-shadow:0 10px 22px rgba(0,114,251,0.28);}
  .btn:active{transform:scale(0.98);}
  .msg{margin-top:12px;font-size:13px;padding:10px 13px;border-radius:10px;display:none;}
  .msg.ok{display:block;background:rgba(31,157,107,0.10);color:var(--green);border:1px solid rgba(31,157,107,0.25);}
  .msg.err{display:block;background:rgba(229,72,77,0.08);color:var(--red);border:1px solid rgba(229,72,77,0.25);}
  .list-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;cursor:pointer;gap:8px;}
  .list-head .chev{flex-shrink:0;}
  .list-head.open .chev{transform:rotate(180deg);}
  .list-count{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink-3);}
  .consultante{display:flex;align-items:center;gap:12px;padding:13px 0;border-top:1px solid var(--line);overflow:hidden;transition:opacity .3s ease, max-height .3s ease, padding .3s ease, margin .3s ease;max-height:220px;opacity:1;}
  .consultante:first-of-type{border-top:none;}
  .consultante.entering{opacity:0; max-height:0; padding-top:0; padding-bottom:0;}
  .consultante.leaving{opacity:0; max-height:0!important; padding-top:0!important; padding-bottom:0!important; border-top-color:transparent;}
  .c-info{flex:1;min-width:0;}
  .c-nombre{font-size:14px;font-weight:600;}
  .c-user{font-family:'DM Mono',monospace;font-size:11.5px;color:var(--ink-3);margin-top:1px;}
  .c-pass{font-family:'DM Mono',monospace;font-size:11px;color:var(--blue);margin-top:2px;background:var(--chip);display:inline-block;padding:1px 7px;border-radius:6px;}
  .c-estado{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.05em;padding:3px 9px;border-radius:20px;flex-shrink:0;transition:background .25s ease, color .25s ease;}
  .c-estado.activo{background:rgba(31,157,107,0.12);color:var(--green);}
  .c-estado.inactivo{background:rgba(133,146,180,0.15);color:var(--ink-3);}
  .c-actions{display:flex;gap:6px;flex-shrink:0;}
  .icon-btn{width:30px;height:30px;border-radius:8px;background:var(--chip);border:1px solid var(--line);color:var(--ink-2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s ease, transform .1s ease;}
  .icon-btn:active{transform:scale(0.92);}
  .icon-btn.danger:hover{background:rgba(229,72,77,0.10);}
  .c-nombre{display:flex; align-items:center; gap:6px; cursor:pointer;}
  .c-chev{transition:transform .2s ease; color:var(--ink-3); flex-shrink:0;}
  .c-chev.open{transform:rotate(180deg);}
  .c-detalle{max-height:0; overflow:hidden; transition:max-height .3s ease;}
  .c-detalle.open{max-height:300px;}
  .cd-inner{padding:12px 0 4px 0;}
  .cd-section{padding:10px 0;border-top:1px dashed var(--line);}
  .cd-section:first-child{border-top:none;}
  .cd-label{font-size:12px;font-weight:700;color:var(--ink-2);margin-bottom:8px;}
  .cd-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .cd-btn{background:var(--chip);border:1px solid var(--line);border-radius:8px;padding:7px 12px;font-size:12px;font-weight:600;color:var(--blue);cursor:pointer;}
  .cd-hint{font-size:12px;color:var(--ink-3);}
  .modal-bg{position:fixed;inset:0;z-index:60;background:rgba(11,27,51,0.35);backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:opacity .25s ease;display:flex;align-items:center;justify-content:center;padding:20px;}
  .modal-bg.show{opacity:1;pointer-events:auto;}
  .modal-card{background:#fff;border-radius:18px;padding:22px;width:100%;max-width:380px;max-height:85vh;overflow-y:auto;transform:translateY(16px);transition:transform .25s ease;}
  .modal-bg.show .modal-card{transform:translateY(0);}
  .content-tree{font-size:13px;}
  .folder{background:var(--card); border:1px solid var(--line); border-radius:16px; margin-bottom:10px; overflow:hidden; box-shadow:0 6px 20px var(--shadow); transition:border-color .2s ease;}
  .folder.open{border-color:rgba(0,114,251,0.35);}
  .folder-head{display:flex;align-items:center;gap:12px;padding:15px 16px;cursor:pointer;position:relative;}
  .folder-head::before{content:''; position:absolute; left:0; top:14px; bottom:14px; width:3px; background:var(--blue); border-radius:0 3px 3px 0; opacity:0; transition:opacity .2s ease;}
  .folder.open .folder-head::before{opacity:1;}
  .folder-icon{width:34px;height:34px;border-radius:10px;background:var(--chip);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .folder-icon svg{width:16px;height:16px;}
  .folder-meta{flex:1;min-width:0;}
  .folder-name{font-size:15px;font-weight:600;}
  .folder-count{font-family:'DM Mono', monospace;font-size:11px;color:var(--ink-3);margin-top:2px;}
  .chev{color:var(--ink-3);transition:transform .25s ease;flex-shrink:0;}
  .folder.open .chev{transform:rotate(180deg);color:var(--blue);}
  .resource-list{max-height:0;overflow:hidden;transition:max-height .3s ease;}
  .folder.open .resource-list{max-height:600px;}
  .resource{display:flex;align-items:center;gap:12px;padding:12px 16px 12px 62px;border-top:1px solid var(--line);cursor:pointer;}
  .resource:hover{background:#F6FAFF;}
  .resource-dot{width:6px;height:6px;border-radius:50%;background:var(--blue-2);flex-shrink:0;}
  .resource.pending .resource-dot{background:var(--line);}
  .resource-title{font-size:13.5px;font-weight:500;color:var(--ink-1);flex:1;}
  .resource.pending .resource-title{color:var(--ink-3);}
  .resource-tag{font-family:'DM Mono', monospace; font-size:9.5px; color:var(--ink-3); text-transform:uppercase; letter-spacing:.04em;}
  .resource-arrow{color:var(--ink-3);font-size:13px;}
  #previewOverlay{position:fixed; inset:0; z-index:50; background:#FBFDFF; opacity:0; transform:translateY(28px); pointer-events:none; transition:opacity .32s ease, transform .38s cubic-bezier(.22,1,.36,1);}
  #previewOverlay.show{opacity:1; transform:translateY(0); pointer-events:auto;}
  #previewOverlay iframe{width:100%; height:100%; border:none; display:block;}
  .preview-back{position:fixed; top:14px; left:14px; z-index:51; width:38px; height:38px; border-radius:11px; background:rgba(255,255,255,0.85); backdrop-filter:blur(8px); border:1px solid var(--line); display:none; align-items:center; justify-content:center; color:var(--ink-1); cursor:pointer; box-shadow:0 6px 16px rgba(20,60,140,0.12);}
  .preview-back.show{display:flex;}
  .empty{color:var(--ink-3);font-size:13px;text-align:center;padding:20px 0;}
  .hint{font-size:11.5px;color:var(--ink-3);margin-top:6px;line-height:1.5;}
  .session-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;font-size:12.5px;color:var(--ink-3);}
  .link-btn{background:none;border:none;color:var(--blue);font-size:12.5px;font-weight:600;cursor:pointer;padding:0;}
  .link-btn.muted{color:var(--ink-3);}
  .crear-head{display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
  .crear-head .chev{transition:transform .2s ease;}
  .crear-head.open .chev{transform:rotate(180deg);}
  .crear-body{max-height:0;overflow:hidden;transition:max-height .32s ease;}
  .crear-body.open{max-height:700px;}
  #consultantesBody.open{max-height:3000px;}
  .crear-body-inner{padding-top:16px;}
</style>
</head>
<body>

<div id="bg"><div class="mid"></div></div>

<div id="screen-panel">
<div class="wrap">

<script>
const SUPABASE_URL = 'https://ebtxzmwsuzzfkamxteyg.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVidHh6bXdzdXp6ZmthbXh0ZXlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMDk0NTUsImV4cCI6MjA5Nzc4NTQ1NX0.nBgOxK1ThCDwhixzaUluP75p7RRQ5hfjp3ef1keaHqY';
const NUTRICIONISTA_ID = '76574da7-324f-4030-9944-f21e66eb9e57';

async function rpc(fn, args){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`, {
    method:'POST',
    headers:{
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      'Content-Type':'application/json'
    },
    body: JSON.stringify(args)
  });
  const data = await res.json().catch(()=>null);
  if(!res.ok){ throw new Error((data && (data.message || data.hint)) || 'Error de conexión'); }
  return data;
}

function logout(){
  sessionStorage.removeItem('nfu_admin_session');
  sessionStorage.removeItem('nfu_admin_ident');
  window.location.href = '/prototypes/index.html';
}

function showChangePassword(){
  document.getElementById('cardChangePw').style.display = 'block';
  document.getElementById('cardChangePw').scrollIntoView({behavior:'smooth'});
}

async function cambiarMiPassword(){
  const ident = sessionStorage.getItem('nfu_admin_ident') || '';
  const actual = document.getElementById('cpActual').value.trim();
  const nueva = document.getElementById('cpNueva').value.trim();
  if(!actual || !nueva){ showMsg('msgChangePw','Completá los dos campos.', false); return; }
  try{
    const ok = await rpc('cambiar_password_admin', { p_identificador: ident, p_password_actual: actual, p_password_nuevo: nueva });
    if(ok){
      showMsg('msgChangePw','Contraseña actualizada.', true);
      document.getElementById('cpActual').value = '';
      document.getElementById('cpNueva').value = '';
    } else {
      showMsg('msgChangePw','La contraseña actual no coincide.', false);
    }
  }catch(e){
    showMsg('msgChangePw','Error: ' + e.message, false);
  }
}

function toggleCrear(){
  document.getElementById('crearHead').classList.toggle('open');
  document.getElementById('crearBody').classList.toggle('open');
}

function toggleConsultantes(){
  document.getElementById('consultantesHead').classList.toggle('open');
  document.getElementById('consultantesBody').classList.toggle('open');
}

function initPanel(){
  document.getElementById('sessionWho').textContent = sessionStorage.getItem('nfu_admin_ident') || 'Conectado';
  document.getElementById('screen-panel').classList.add('show');
  cargarLista();
  cargarContenido();
}

function slugify(s){
  return s.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9\s]/g,'')
    .trim().replace(/\s+/g,'.');
}
function sugerirUsuario(){
  const nombre = document.getElementById('fNombre').value;
  document.getElementById('fUsuario').value = slugify(nombre);
}
function generarPassword(){
  const palabras = ['sol','luna','rio','mar','flor','luz','cielo','verde','azul','fuerte'];
  const p = palabras[Math.floor(Math.random()*palabras.length)] + Math.floor(1000+Math.random()*9000);
  document.getElementById('fPassword').value = p;
}

function showMsg(id, text, ok){
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + (ok ? 'ok' : 'err');
}

async function crearConsultante(){
  const nombre = document.getElementById('fNombre').value.trim();
  const username = document.getElementById('fUsuario').value.trim();
  const password = document.getElementById('fPassword').value.trim();
  const fechaNac = document.getElementById('fFechaNac').value || null;
  const sexo = document.getElementById('fSexo').value || null;
  const actividad = document.getElementById('fActividad').value || null;
  if(!nombre || !username || !password){
    showMsg('msgCrear','Completá nombre, usuario y contraseña.', false);
    return;
  }
  try{
    const newId = await rpc('admin_crear_consultante', {
      p_nutricionista_id: NUTRICIONISTA_ID,
      p_nombre: nombre,
      p_username: username,
      p_password: password,
      p_fecha_nacimiento: fechaNac,
      p_sexo: sexo,
      p_actividad_fisica: actividad
    });
    document.getElementById('msgCrear').className = 'msg';
    document.getElementById('fNombre').value = '';
    document.getElementById('fUsuario').value = '';
    document.getElementById('fPassword').value = '';
    document.getElementById('fFechaNac').value = '';
    document.getElementById('fSexo').value = '';
    document.getElementById('fActividad').value = '';

    const lista = document.getElementById('lista');
    const emptyEl = lista.querySelector('.empty');
    if(emptyEl) lista.innerHTML = '';
    const nuevo = { id:newId, nombre, username, password, estado:'activo', created_at:new Date().toISOString(), fecha_nacimiento:fechaNac, sexo, actividad_fisica:actividad };
    const wrapper = document.createElement('div');
    wrapper.innerHTML = renderConsultante(nuevo);
    const el = wrapper.firstElementChild;
    el.querySelector('.consultante').classList.add('entering');
    lista.prepend(el);
    requestAnimationFrame(()=> requestAnimationFrame(()=> el.querySelector('.consultante').classList.remove('entering')));

    const countEl = document.getElementById('listCount');
    const current = lista.querySelectorAll('.consultante').length;
    countEl.textContent = current + (current===1?' consultante':' consultantes');
    cargarContenido();
  }catch(e){
    const dup = /duplicate|unique/i.test(e.message);
    showMsg('msgCrear', dup ? 'Ese usuario ya existe — probá otro.' : ('Error: ' + e.message), false);
  }
}

async function toggleEstado(id, estadoActual){
  const nuevo = estadoActual === 'activo' ? 'inactivo' : 'activo';
  await rpc('admin_set_estado_consultante', { p_id: id, p_estado: nuevo });
  const badge = document.getElementById('estado-'+id);
  if(badge){
    badge.textContent = nuevo;
    badge.className = 'c-estado ' + nuevo;
  }
  const btn = document.querySelector(`.consultante[data-id="${id}"] button[title="Activar/Desactivar"]`);
  if(btn) btn.setAttribute('onclick', `toggleEstado('${id}','${nuevo}')`);
}

async function eliminarConsultante(id, nombre){
  if(!confirm(`¿Eliminar a ${nombre}? No se puede deshacer.`)) return;
  try{
    await rpc('admin_eliminar_consultante', { p_id: id });
    const wrap = document.querySelector(`.consultante-wrap[data-id="${id}"]`);
    if(wrap){
      const row = wrap.querySelector('.consultante');
      row.classList.add('leaving');
      setTimeout(()=>{
        wrap.remove();
        const lista = document.getElementById('lista');
        const current = lista.querySelectorAll('.consultante').length;
        document.getElementById('listCount').textContent = current + (current===1?' consultante':' consultantes');
        if(!current) lista.innerHTML = '<div class="empty">Todavía no creaste ningún consultante.</div>';
      }, 320);
    }
  }catch(e){
    alert('No se pudo eliminar: ' + e.message);
  }
}

async function cambiarPassword(id, nombre){
  const nueva = prompt(`Nueva contraseña para ${nombre}:`);
  if(!nueva) return;
  await rpc('admin_set_password_consultante', { p_id: id, p_password: nueva.trim() });
  const chip = document.getElementById('pass-'+id);
  if(chip) chip.textContent = nueva.trim();
}

function renderConsultante(c){
  const fecha = new Date(c.created_at).toLocaleDateString('es-AR', {day:'2-digit',month:'2-digit',year:'2-digit'});
  window.CONSULTANTES_MAP = window.CONSULTANTES_MAP || {};
  window.CONSULTANTES_MAP[c.id] = c;
  return `<div class="consultante-wrap" data-id="${c.id}">
  <div class="consultante" data-id="${c.id}">
    <div class="c-info">
      <div class="c-nombre" onclick="toggleDetalle('${c.id}')">${c.nombre}<svg class="c-chev" id="chev-${c.id}" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></div>
      <div class="c-user">@${c.username || '—'} · desde ${fecha}</div>
      <div class="c-pass" id="pass-${c.id}">${c.password || '—'}</div>
    </div>
    <div class="c-estado ${c.estado}" id="estado-${c.id}">${c.estado}</div>
    <div class="c-actions">
      <button class="icon-btn" title="Editar" onclick="abrirEditar('${c.id}')">✏️</button>
      <button class="icon-btn" title="Cambiar contraseña" onclick="cambiarPassword('${c.id}','${c.nombre.replace(/'/g,"")}')">🔑</button>
      <button class="icon-btn" title="Activar/Desactivar" onclick="toggleEstado('${c.id}','${c.estado}')">⏻</button>
      <button class="icon-btn danger" title="Eliminar" onclick="eliminarConsultante('${c.id}','${c.nombre.replace(/'/g,"")}')">🗑️</button>
    </div>
  </div>
  <div class="c-detalle" id="detalle-${c.id}">
    <div class="cd-inner">
      <div class="cd-section">
        <div class="cd-label">Plan nutricional</div>
        <div class="cd-actions" id="plan-actions-${c.id}"><span class="cd-hint">Cargando…</span></div>
      </div>
      <div class="cd-section">
        <div class="cd-label">Otros archivos</div>
        <div class="cd-hint">Próximamente</div>
      </div>
    </div>
  </div>
  </div>`;
}

async function toggleDetalle(id){
  const panel = document.getElementById('detalle-'+id);
  const chev = document.getElementById('chev-'+id);
  const opening = !panel.classList.contains('open');
  panel.classList.toggle('open');
  chev.classList.toggle('open');
  if(opening){
    try{
      const rows = await rpc('admin_ver_plan_individual', { p_consultante_id: id });
      const actionsEl = document.getElementById('plan-actions-'+id);
      if(rows && rows.length){
        actionsEl.innerHTML = `<button class="cd-btn" onclick="planEditar('${id}','${rows[0].id}')">Editar</button><button class="cd-btn" onclick="planEliminar('${id}','${rows[0].id}')">Eliminar</button>`;
      } else {
        actionsEl.innerHTML = `<button class="cd-btn" onclick="planAgregar('${id}')">+ Agregar</button>`;
      }
    }catch(e){
      document.getElementById('plan-actions-'+id).innerHTML = '<span class="cd-hint">Error cargando.</span>';
    }
  }
}

function planAgregar(consultanteId){
  alert('Esto lo armamos en el próximo paso — falta que me confirmes los campos exactos del plan (comidas, días con/sin entreno, puntos HC, proteína, etc).');
}
function planEditar(consultanteId, recursoId){
  alert('Editor del plan individual — pendiente de construir con los campos que me vas a confirmar.');
}
async function planEliminar(consultanteId, recursoId){
  if(!confirm('¿Eliminar el plan nutricional de este consultante?')) return;
  // placeholder: se conecta cuando exista la tabla/RPC definitiva del plan
  alert('Falta conectar esto a la estructura final del plan.');
}

function abrirEditar(id){
  const c = window.CONSULTANTES_MAP[id];
  if(!c) return;
  document.getElementById('modalEditar').dataset.id = id;
  document.getElementById('eNombre').value = c.nombre || '';
  document.getElementById('eUsuario').value = c.username || '';
  document.getElementById('eFechaNac').value = c.fecha_nacimiento || '';
  document.getElementById('eSexo').value = c.sexo || '';
  document.getElementById('eActividad').value = c.actividad_fisica || '';
  document.getElementById('msgEditar').className = 'msg';
  document.getElementById('modalEditar').classList.add('show');
}
function cerrarEditar(){
  document.getElementById('modalEditar').classList.remove('show');
}
async function guardarEdicion(){
  const id = document.getElementById('modalEditar').dataset.id;
  const nombre = document.getElementById('eNombre').value.trim();
  const username = document.getElementById('eUsuario').value.trim();
  const fecha = document.getElementById('eFechaNac').value || null;
  const sexo = document.getElementById('eSexo').value || null;
  const actividad = document.getElementById('eActividad').value || null;
  if(!nombre || !username){ showMsg('msgEditar','Completá nombre y usuario.', false); return; }
  try{
    await rpc('admin_editar_consultante', {
      p_id: id, p_nombre: nombre, p_username: username,
      p_fecha_nacimiento: fecha, p_sexo: sexo, p_actividad_fisica: actividad
    });
    const c = window.CONSULTANTES_MAP[id];
    c.nombre = nombre; c.username = username; c.fecha_nacimiento = fecha; c.sexo = sexo; c.actividad_fisica = actividad;
    document.querySelector(`.consultante[data-id="${id}"] .c-nombre`).innerHTML = `${nombre}<svg class="c-chev" id="chev-${id}" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>`;
    document.querySelector(`.consultante[data-id="${id}"] .c-nombre`).setAttribute('onclick', `toggleDetalle('${id}')`);
    const userEl = document.querySelector(`.consultante[data-id="${id}"] .c-user`);
    const fechaTxt = userEl.textContent.split('·')[1] ? '·' + userEl.textContent.split('·')[1] : '';
    userEl.textContent = `@${username} ${fechaTxt}`;
    cerrarEditar();
  }catch(e){
    const dup = /duplicate|unique/i.test(e.message);
    showMsg('msgEditar', dup ? 'Ese usuario ya existe.' : ('Error: ' + e.message), false);
  }
}

async function cargarLista(){
  try{
    const data = await rpc('admin_listar_consultantes', { p_nutricionista_id: NUTRICIONISTA_ID });
    document.getElementById('listCount').textContent = data.length + (data.length===1?' consultante':' consultantes');
    document.getElementById('lista').innerHTML = data.length
      ? data.map(renderConsultante).join('')
      : '<div class="empty">Todavía no creaste ningún consultante.</div>';
  }catch(e){
    document.getElementById('lista').innerHTML = '<div class="empty">Error cargando la lista.</div>';
  }
}

function folderIconSvg(){ return `<svg viewBox="0 0 24 24" fill="none" stroke="#0072FB" stroke-width="2"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>`; }
function chevSvg(){ return `<svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>`; }

function toggleContentFolder(i){
  document.querySelectorAll('#contentTree .folder').forEach(f=>{ if(parseInt(f.dataset.folder)!==i) f.classList.remove('open'); });
  document.querySelector('#contentTree [data-folder="'+i+'"]').classList.toggle('open');
}

async function cargarContenido(){
  try{
    const rows = await rpc('admin_ver_contenido', { p_nutricionista_id: NUTRICIONISTA_ID });
    const byCarpeta = {};
    const orden = [];
    rows.forEach(r=>{
      if(!byCarpeta[r.carpeta_id]){ byCarpeta[r.carpeta_id] = { nombre:r.carpeta_nombre, items:[] }; orden.push(r.carpeta_id); }
      if(r.recurso_id) byCarpeta[r.carpeta_id].items.push(r);
    });
    let html = '';
    orden.forEach((cid, i)=>{
      const carpeta = byCarpeta[cid];
      const activos = carpeta.items.filter(it=>it.activo).length;
      const countLabel = carpeta.items.length ? `${activos} de ${carpeta.items.length} listos` : '— vacía';
      const itemsHtml = carpeta.items.length
        ? carpeta.items.map(it=>{
            const who = it.consultante_id ? it.consultante_nombre : 'compartido';
            const cls = it.activo ? '' : ' pending';
            return `<div class="resource${cls}" onclick="abrirPreview('${it.recurso_id}')"><div class="resource-dot"></div><div class="resource-title">${it.titulo}</div><div class="resource-tag">${who}</div></div>`;
          }).join('')
        : `<div class="resource" style="cursor:default;padding-left:16px;color:var(--ink-3)">Sin recursos todavía</div>`;
      html += `<div class="folder" data-folder="${i}">
        <div class="folder-head" onclick="toggleContentFolder(${i})">
          <div class="folder-icon">${folderIconSvg()}</div>
          <div class="folder-meta"><div class="folder-name">${carpeta.nombre}</div><div class="folder-count">${countLabel}</div></div>
          ${chevSvg()}
        </div>
        <div class="resource-list">${itemsHtml}</div>
      </div>`;
    });
    document.getElementById('contentTree').innerHTML = html || '<div class="empty">Todavía no tenés carpetas.</div>';
  }catch(e){
    document.getElementById('contentTree').innerHTML = '<div class="empty">Error cargando el contenido.</div>';
  }
}

function abrirPreview(recursoId){
  document.getElementById('previewIframe').src = 'plan_nutricional_reader.html?open=' + recursoId;
  document.getElementById('previewOverlay').classList.add('show');
  document.getElementById('previewBack').classList.add('show');
}
function cerrarPreview(){
  document.getElementById('previewOverlay').classList.remove('show');
  document.getElementById('previewBack').classList.remove('show');
  document.getElementById('previewIframe').src = '';
}

function enterSubmits(containerId, callback){
  const el = document.getElementById(containerId);
  if(!el) return;
  el.addEventListener('keydown', e=>{
    if(e.key === 'Enter' && e.target.tagName === 'INPUT'){ e.preventDefault(); callback(); }
  });
}
enterSubmits('cardChangePw', cambiarMiPassword);
enterSubmits('cardCrear', crearConsultante);
enterSubmits('modalEditar', guardarEdicion);

document.addEventListener('gesturestart', e=> e.preventDefault());
initPanel();
